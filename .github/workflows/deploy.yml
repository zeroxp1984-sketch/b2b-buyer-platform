.github/workflows/deploy.yml
 yaml                                                                                                                
    name: Deploy to GitHub Pages                                                                                        
    on:                                                                                                                 
      push:                                                                                                             
        branches: ["master"]                                                                                            
      workflow_dispatch:                                                                                                
    permissions:                                                                                                        
      contents: read                                                                                                    
      pages: write                                                                                                      
      id-token: write                                                                                                   
    jobs:                                                                                                               
      deploy:                                                                                                           
        runs-on: ubuntu-latest                                                                                          
        steps:                                                                                                          
          - uses: actions/checkout@v4                                                                                   
          - name: Upload Pages Artifact                                                                                 
            uses: actions/upload-pages-artifact@v3                                                                      
            with:                                                                                                       
              path: "."                                                                                                 
          - name: Deploy to GitHub Pages                                                                                
            uses: actions/deploy-pages@v4                                                                               
                                            
